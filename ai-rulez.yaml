$schema: https://github.com/Goldziher/ai-rulez/schema/ai-rules-v2.schema.json
agents: []
commands: []
mcp_servers:
  - args:
      - -y
      - ai-rulez@latest
      - mcp
    command: npx
    description: AI-Rulez MCP server for configuration management
    name: ai-rulez
metadata:
  description: Rust workspace bundling 170+ tree-sitter language parsers with polyglot bindings for Python, Node.js, Go, Java, Elixir, and C.
  name: tree-sitter-language-pack
  version: 2.0.0-alpha.1
presets:
  - popular
rules:
  - content: All language additions must be registered in sources/language_definitions.json with complete metadata (name, source URL, commit hash). Pin vendor dependencies using `task update:grammars` before committing. Never commit unpinned language sources.
    name: Tree-sitter Language Definitions
    priority: critical
  - content: Run `task test` before committing. All language bindings must have corresponding E2E tests via fixtures in `fixtures/`. Use `task e2e:test:rust` to run the Rust E2E suite. Verify each language can be loaded and basic parsing works.
    name: Testing Requirements
    priority: critical
  - content: Run `task lint` (prek) to run all pre-commit hooks before committing. This includes cargo fmt, cargo clippy, ruff, mypy, markdownlint, actionlint, shellcheck, and codespell.
    name: Linting
    priority: critical
  - content: Only include languages with permissive licenses (MIT, Apache 2.0). No GPL-licensed tree-sitter grammars. Verify license compatibility in language_definitions.json before adding new languages.
    name: License Compliance
    priority: high
  - content: Follow conventional commits using 'feat:', 'chore:', 'docs:', 'fix:' prefixes. Keep commits atomic and descriptive for changelog generation. Never add AI co-author signatures.
    name: Commit Convention
    priority: medium
  - content: Use Taskfile.yml for all build/test/lint/update commands. Use `uv` for Python dependency management, `cargo` for Rust. Use `prek` (pre-commit) for linting hooks. Do not use Makefile.
    name: Build Tools
    priority: high
  - content: READMEs are generated from Jinja2 templates in scripts/readme_templates/ with config in scripts/readme_config.yaml. Never edit generated READMEs directly. Use `task generate-readme` to regenerate and `task generate-readme:check` to validate.
    name: README Generation
    priority: high
  - content: E2E tests are generated from JSON fixtures in fixtures/ by the e2e-generator tool. Never edit generated test files in e2e/ directly. Use `task e2e:generate:all` to regenerate.
    name: E2E Test Generation
    priority: high
sections:
  - content: |-
      ## Quick Start

      ### Prerequisites
      - Rust toolchain (rustup)
      - Python 3.10+ with [uv](https://github.com/astral-sh/uv)
      - [Task](https://taskfile.dev/) task runner
      - Node.js (for tree-sitter CLI)

      ### Setup

      ```bash
      git clone https://github.com/Goldziher/tree-sitter-language-pack.git
      cd tree-sitter-language-pack
      task setup
      ```

      ### Common Commands

      ```bash
      task build          # Build all crates
      task build:dev      # Build with a few languages (fast iteration)
      task test           # Run all tests
      task lint           # Run all linters via prek
      task format         # Format all code (Rust + Python)
      task update         # Update all dependencies
      task clean          # Clean build artifacts
      ```

      ### E2E Tests

      ```bash
      task e2e:generate:all       # Generate E2E tests for all bindings
      task e2e:generate:rust      # Generate + format Rust E2E tests
      task e2e:test:rust          # Generate + run Rust E2E tests
      task e2e:generate:smoke-fixtures  # Auto-generate smoke fixtures
      ```

      ### README Generation

      ```bash
      task generate-readme        # Generate all READMEs
      task generate-readme:check  # Validate READMEs (CI)
      ```
    name: Quick Start
    priority: high
  - content: |-
      ## Architecture

      ### Workspace Structure

      ```text
      tree-sitter-language-pack/
      ├── crates/
      │   ├── ts-pack-core/       # Rust core: parser compilation + language registry
      │   ├── ts-pack-ffi/        # C-FFI layer (cbindgen)
      │   ├── ts-pack-python/     # Python binding (PyO3/maturin)
      │   ├── ts-pack-node/       # Node.js binding (NAPI-RS)
      │   ├── ts-pack-go/         # Go binding (cgo)
      │   ├── ts-pack-java/       # Java binding (Panama FFI, JDK 22+)
      │   ├── ts-pack-elixir/     # Elixir binding (Rustler NIF)
      │   └── ts-pack-cli/        # CLI tool
      ├── tools/
      │   └── e2e-generator/      # Fixture-driven E2E test generator
      ├── fixtures/               # E2E test fixtures (JSON)
      ├── e2e/                    # Generated E2E test suites
      ├── scripts/                # README generation, vendor management
      ├── sources/                # Language definitions
      └── .task/                  # Taskfile includes (rust.yml, python.yml)
      ```

      ### Key Crates

      - **ts-pack-core**: Build script compiles tree-sitter grammars from `parsers/` directory. Supports `TSLP_LANGUAGES` env var for selective compilation and `TSLP_LINK_MODE` for static/dynamic linking.
      - **ts-pack-ffi**: Exposes C API via `ts_pack.h` generated by cbindgen. Used by Go, Java, and C bindings.
      - **ts-pack-python**: PyO3 binding with PyCapsule-based API compatible with tree-sitter Python package.
      - **ts-pack-node**: NAPI-RS binding returning raw language pointers for use with tree-sitter Node.js package.

      ### Build Configuration

      Environment variables:
      - `PROJECT_ROOT` — workspace root (set automatically by Taskfile)
      - `TSLP_LANGUAGES` — comma-separated list of languages to compile (default: all)
      - `TSLP_LINK_MODE` — `static` or `dynamic` linking (default: dynamic)
    name: Architecture
    priority: medium
  - content: |-
      ## Adding a New Language

      1. Edit `sources/language_definitions.json`:
         ```json
         {
           "newlang": {
             "repo": "https://github.com/tree-sitter/tree-sitter-newlang",
             "rev": "abc123def456",
             "branch": "main",
             "directory": "src",
             "generate": false
           }
         }
         ```

      2. Clone and build:
         ```bash
         task clone
         task build
         ```

      3. Add a smoke fixture in `fixtures/smoke/newlang.json`

      4. Regenerate E2E tests:
         ```bash
         task e2e:generate:all
         ```

      5. Run tests:
         ```bash
         task test
         task e2e:test:rust
         ```
    name: Adding a New Language
    priority: high
