name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0-rc.1)"
        required: true
        type: string
      dry_run:
        description: "Dry run (prepare artifacts without publishing)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Comma-separated targets (all, python, node, crates, go)"
        required: false
        type: string
        default: "all"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  # ─── Prepare ───────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish_python: ${{ steps.targets.outputs.python }}
      publish_node: ${{ steps.targets.outputs.node }}
      publish_crates: ${{ steps.targets.outputs.crates }}
      publish_go: ${{ steps.targets.outputs.go }}
    steps:
      - name: Extract version
        id: meta
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Determine targets
        id: targets
        run: |
          targets="${{ inputs.targets }}"
          for target in python node crates go; do
            if [[ "$targets" == "all" || "$targets" == *"$target"* ]]; then
              echo "$target=true" >> "$GITHUB_OUTPUT"
            else
              echo "$target=false" >> "$GITHUB_OUTPUT"
            fi
          done

  # ─── Registry checks ──────────────────────────────────────────────
  check-cratesio:
    name: Check crates.io
    needs: prepare
    if: needs.prepare.outputs.publish_crates == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/ts-pack-core/$VERSION")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ts-pack-core $VERSION already published on crates.io"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  check-pypi:
    name: Check PyPI
    needs: prepare
    if: needs.prepare.outputs.publish_python == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/tree-sitter-language-pack/$VERSION/json")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tree-sitter-language-pack $VERSION already published on PyPI"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  check-npm:
    name: Check npm
    needs: prepare
    if: needs.prepare.outputs.publish_node == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/tree-sitter-language-pack/$VERSION")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tree-sitter-language-pack $VERSION already published on npm"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Clone vendors ────────────────────────────────────────────────
  clone-vendors:
    name: Clone vendors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers

  # ─── Publish Rust crates ──────────────────────────────────────────
  publish-crates:
    name: Publish Rust crates
    needs: [prepare, clone-vendors, check-cratesio]
    if: |
      needs.prepare.outputs.publish_crates == 'true' &&
      needs.check-cratesio.outputs.exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ts-pack-core
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p ts-pack-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Publish ts-pack-ffi
        if: ${{ !inputs.dry_run }}
        run: |
          sleep 30
          cargo publish -p ts-pack-ffi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PROJECT_ROOT: ${{ github.workspace }}

  # ─── Build & Publish Python ───────────────────────────────────────
  build-python-wheels:
    name: Build Python wheel (${{ matrix.os }})
    needs: [prepare, clone-vendors, check-pypi]
    if: |
      needs.prepare.outputs.publish_python == 'true' &&
      needs.check-pypi.outputs.exists != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/ts-pack-python/Cargo.toml --out dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.os }}
          path: dist/*.whl

  publish-python:
    name: Publish Python to PyPI
    needs: [prepare, build-python-wheels]
    if: needs.prepare.outputs.publish_python == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─── Build & Publish Node.js ──────────────────────────────────────
  build-node-native:
    name: Build Node.js (${{ matrix.os }})
    needs: [prepare, clone-vendors, check-npm]
    if: |
      needs.prepare.outputs.publish_node == 'true' &&
      needs.check-npm.outputs.exists != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: crates/ts-pack-node
        run: napi build --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: node-native-${{ matrix.os }}
          path: crates/ts-pack-node/*.node

  publish-node:
    name: Publish Node.js to npm
    needs: [prepare, build-node-native]
    if: needs.prepare.outputs.publish_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all native modules
        uses: actions/download-artifact@v4
        with:
          path: crates/ts-pack-node
          pattern: node-native-*
          merge-multiple: true

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: crates/ts-pack-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Build Go FFI libraries ──────────────────────────────────────
  build-go-ffi:
    name: Build Go FFI (${{ matrix.label }})
    needs: [prepare, clone-vendors]
    if: needs.prepare.outputs.publish_go == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/ts-pack-ffi/lib staging/ts-pack-ffi/include
          cp target/release/libts_pack_ffi.a staging/ts-pack-ffi/lib/
          cp crates/ts-pack-ffi/include/ts_pack.h staging/ts-pack-ffi/include/
          cd staging && tar -czf "../ts-pack-ffi-${{ matrix.label }}.tar.gz" ts-pack-ffi/

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging/ts-pack-ffi/lib staging/ts-pack-ffi/include
          cp target/release/ts_pack_ffi.lib staging/ts-pack-ffi/lib/ 2>/dev/null || cp target/release/libts_pack_ffi.a staging/ts-pack-ffi/lib/
          cp crates/ts-pack-ffi/include/ts_pack.h staging/ts-pack-ffi/include/
          cd staging && tar -czf "../ts-pack-ffi-${{ matrix.label }}.tar.gz" ts-pack-ffi/

      - name: Upload FFI artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-ffi-${{ matrix.label }}
          path: ts-pack-ffi-${{ matrix.label }}.tar.gz
          retention-days: 14

  # ─── GitHub Release ───────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs:
      - prepare
      - publish-crates
      - publish-python
      - publish-node
      - build-go-ffi
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download Go FFI artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: go-ffi-*
          merge-multiple: true
        continue-on-error: true

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ inputs.tag }}"
          # Find any Go FFI artifacts to attach
          ASSETS=""
          for f in release-assets/ts-pack-ffi-*.tar.gz; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            ${ASSETS}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          {
            echo "## Release Summary"
            echo "- **Tag**: ${{ inputs.tag }}"
            echo "- **Version**: ${{ needs.prepare.outputs.version }}"
            echo "- **Dry run**: ${{ inputs.dry_run }}"
            echo "- **Targets**: ${{ inputs.targets }}"
          } >> "$GITHUB_STEP_SUMMARY"
