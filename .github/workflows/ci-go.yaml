name: CI / Go

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/ts-pack-go/**"
      - "crates/ts-pack-ffi/**"
      - "crates/ts-pack-core/**"
      - "e2e/go/**"
      - "fixtures/**"
      - ".github/workflows/ci-go.yaml"
  push:
    branches: [main]
    paths:
      - "crates/ts-pack-go/**"
      - "crates/ts-pack-ffi/**"
      - "crates/ts-pack-core/**"
      - "e2e/go/**"
      - "fixtures/**"
      - ".github/workflows/ci-go.yaml"
  workflow_dispatch:

concurrency:
  group: ci-go-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  clone-vendors:
    name: Clone vendors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-ffi:
    name: Build FFI library
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffi-linux
          path: |
            target/release/libts_pack_ffi.a
            target/release/libts_pack_ffi.so
            crates/ts-pack-ffi/include/
          retention-days: 1

  test-go:
    name: Go unit tests
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffi-linux
          path: ffi-artifacts

      - name: Restore FFI to expected path
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true
          mkdir -p crates/ts-pack-ffi/include
          cp -r ffi-artifacts/crates/ts-pack-ffi/include/* crates/ts-pack-ffi/include/ 2>/dev/null || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run Go tests
        working-directory: crates/ts-pack-go
        run: go test -tags tspack_dev -v ./...
        env:
          PROJECT_ROOT: ${{ github.workspace }}

  e2e-go:
    name: Go E2E tests
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffi-linux
          path: ffi-artifacts

      - name: Restore FFI to expected path
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true
          mkdir -p crates/ts-pack-ffi/include
          cp -r ffi-artifacts/crates/ts-pack-ffi/include/* crates/ts-pack-ffi/include/ 2>/dev/null || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Generate E2E tests
        run: cargo run -p e2e-generator -- generate --lang go
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Run E2E tests
        working-directory: e2e/go
        run: go test -tags tspack_dev -v ./...
        env:
          PROJECT_ROOT: ${{ github.workspace }}
