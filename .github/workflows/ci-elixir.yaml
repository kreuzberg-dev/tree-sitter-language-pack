name: CI / Elixir

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/ts-pack-elixir/**"
      - "crates/ts-pack-core/**"
      - "e2e/elixir/**"
      - "fixtures/**"
      - ".github/workflows/ci-elixir.yaml"
  push:
    branches: [main]
    paths:
      - "crates/ts-pack-elixir/**"
      - "crates/ts-pack-core/**"
      - "e2e/elixir/**"
      - "fixtures/**"
      - ".github/workflows/ci-elixir.yaml"
  workflow_dispatch:

concurrency:
  group: ci-elixir-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  clone-vendors:
    name: Clone vendors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  test-elixir:
    name: Elixir tests
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"

      - name: Install Elixir dependencies
        working-directory: crates/ts-pack-elixir
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile and test
        working-directory: crates/ts-pack-elixir
        run: mix test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          MIX_ENV: test
