name: CI / Node.js

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/ts-pack-node/**"
      - "crates/ts-pack-core/**"
      - "e2e/typescript/**"
      - "fixtures/**"
      - "package.json"
      - ".github/workflows/ci-node.yaml"
  push:
    branches: [main]
    paths:
      - "crates/ts-pack-node/**"
      - "crates/ts-pack-core/**"
      - "e2e/typescript/**"
      - "fixtures/**"
      - "package.json"
      - ".github/workflows/ci-node.yaml"
  workflow_dispatch:

concurrency:
  group: ci-node-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  clone-vendors:
    name: Clone vendors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v4
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-node:
    name: Build Node.js (${{ matrix.os }})
    needs: clone-vendors
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download parsers
        uses: actions/download-artifact@v4
        with:
          name: language-parsers
          path: parsers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: crates/ts-pack-node
        run: napi build --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.os }}
          path: crates/ts-pack-node/*.node
          if-no-files-found: error
