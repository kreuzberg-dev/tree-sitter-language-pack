name: CI Validate

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "tools/**"
      - "scripts/**"
      - "e2e/**"
      - "fixtures/**"
      - "docs/snippets/**"
      - ".github/workflows/ci-validate.yaml"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "pyproject.toml"
      - "biome.json"
      - ".clang-format"
      - "sources/**"
      - "alef.toml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "tools/**"
      - "scripts/**"
      - "e2e/**"
      - "fixtures/**"
      - "docs/snippets/**"
      - ".github/workflows/ci-validate.yaml"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "pyproject.toml"
      - "biome.json"
      - ".clang-format"
      - "sources/**"
      - "alef.toml"
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  validate:
    name: Validate (Lint & Format)
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Rust ---
      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          use-sccache: "false"
          install-llvm-cov: "false"

      # --- Python ---
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: uv sync --no-install-project

      # --- Node.js (for biome) ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install biome
        run: npm install -g @biomejs/biome

      # --- Ruby ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: packages/ruby

      # --- Go ---
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: packages/go/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.1.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # --- Java ---
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25.0.2+10"

      # --- Elixir ---
      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Elixir dependencies
        run: cd packages/elixir && mix deps.get

      # --- C/C++ ---
      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-format

      # --- Task runner ---
      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      # --- Prek ---
      - name: Run prek hooks
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files

  alef-check:
    name: Alef validation (bindings, docs, README, version sync)
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install alef
        run: cargo install --git https://github.com/kreuzberg-dev/alef --tag v0.4.2 --locked --bin alef
        env:
          CARGO_INSTALL_ROOT: ${{ runner.temp }}/alef

      - name: Add alef to PATH
        run: echo "${{ runner.temp }}/alef/bin" >> "$GITHUB_PATH"

      - name: Verify binding API parity
        run: alef verify

      - name: Check README freshness
        run: |
          alef readme
          git diff --exit-code -- packages/*/README.md crates/*/README.md || {
            echo "::error::READMEs are out of date. Run 'alef readme' and commit."
            exit 1
          }

      - name: Check API docs freshness
        run: |
          alef docs
          git diff --exit-code -- docs/reference/ || {
            echo "::error::API docs are out of date. Run 'alef docs' and commit."
            exit 1
          }

      - name: Check version sync
        run: |
          alef sync-versions
          git diff --exit-code -- packages/ crates/ || {
            echo "::error::Versions are out of sync. Run 'alef sync-versions' and commit."
            exit 1
          }

  snippet-check:
    name: Documentation snippet validation
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build snippet-runner
        run: cargo build --release -p snippet-runner

      - name: Validate documentation snippets
        run: ./target/release/snippet-runner validate --snippets docs/snippets --level syntax --timeout 120

  license-check:
    name: License validation
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Verify all grammar licenses are permissive
        run: uv run --no-sync python scripts/lint_grammar_licenses.py --update-cache
        env:
          GH_TOKEN: ${{ github.token }}
