version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # Pin artifact actions to v4 until GitHub Actions runners support v6/v7
      # v6 and v7 require Actions Runner 2.327.1+ (released Dec 12, 2025)
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "cargo"
    # Explicitly list root only — crates/ts-pack-ruby/ext has a standalone workspace
    # with path deps to vendored crates that only exist at build time
    directories:
      - "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "ts-pack-core"
      - dependency-name: "ts-pack-ffi"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/crates/ts-pack-python"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/crates/ts-pack-node"
      - "/crates/ts-pack-wasm"
    schedule:
      interval: "weekly"

  - package-ecosystem: "bundler"
    directory: "/crates/ts-pack-ruby"
    schedule:
      interval: "weekly"

  - package-ecosystem: "composer"
    directories:
      - "/"
      - "/packages/php"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/packages/go/v1"
    schedule:
      interval: "weekly"

  - package-ecosystem: "maven"
    directory: "/crates/ts-pack-java"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/packages/csharp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "mix"
    directory: "/crates/ts-pack-elixir"
    schedule:
      interval: "weekly"
