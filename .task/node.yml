version: "3"

vars:
  # Default dev languages for local builds. Override with TSLP_LANGUAGES env var or pass via CI.
  DEV_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

tasks:
  deps:
    desc: Install Node.js dependencies
    dir: crates/ts-pack-node
    cmds:
      - pnpm install

  update:
    desc: Update Node/TypeScript dependencies (all workspace packages)
    cmds:
      - echo "Updating Node/TypeScript dependencies across workspace..."
      - corepack up
      - pnpm up --latest -r
      - pnpm up --latest -w

  build:
    desc: Build NAPI-RS native module (release, compiles parser libraries)
    dir: crates/ts-pack-node
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      TSLP_LINK_MODE: "{{.TSLP_LINK_MODE | default \"dynamic\"}}"
      TSLP_LANGUAGES: "{{.TSLP_LANGUAGES | default .DEV_LANGUAGES}}"
    cmds:
      - napi build --platform --release

  build:dev:
    desc: Build NAPI-RS native module (debug, compiles parser libraries)
    dir: crates/ts-pack-node
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      TSLP_LINK_MODE: "{{.TSLP_LINK_MODE | default \"dynamic\"}}"
      TSLP_LANGUAGES: "{{.TSLP_LANGUAGES | default .DEV_LANGUAGES}}"
    cmds:
      - napi build --platform

  test:
    desc: Smoke test Node.js native module
    dir: crates/ts-pack-node
    cmds:
      - node -e "const m = require('./'); console.log('Languages:', m.availableLanguages().length)"

  lint:
    desc: Lint TypeScript/JavaScript code
    cmds:
      - npx biome lint --fix .
      - npx oxlint --fix .

  lint:check:
    desc: Check TypeScript/JavaScript linting (CI)
    cmds:
      - npx biome lint .
      - npx oxlint .

  format:
    desc: Format TypeScript/JavaScript code
    cmds:
      - npx biome format --write .

  format:check:
    desc: Check TypeScript/JavaScript formatting (CI)
    cmds:
      - npx biome format .

  clean:
    desc: Clean Node.js build artifacts
    dir: crates/ts-pack-node
    cmds:
      - rm -f *.node

  e2e:generate:
    desc: Generate TypeScript/Node E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang typescript

  e2e:test:
    desc: Run TypeScript/Node E2E tests
    dir: e2e/typescript
    cmds:
      - pnpm install
      - npx vitest run
