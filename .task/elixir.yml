version: "3"

tasks:
  deps:
    desc: Install Elixir dependencies
    dir: crates/ts-pack-elixir
    cmds:
      - mix deps.get

  build:
    desc: Compile Elixir project (includes Rustler NIF)
    dir: crates/ts-pack-elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - mix compile

  test:
    desc: Run Elixir tests
    dir: crates/ts-pack-elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      MIX_ENV: test
    cmds:
      - mix test

  format:
    desc: Format Elixir code
    dir: crates/ts-pack-elixir
    cmds:
      - mix format

  format:check:
    desc: Check Elixir formatting (CI)
    dir: crates/ts-pack-elixir
    cmds:
      - mix format --check-formatted

  lint:
    desc: Lint Elixir code (credo, requires NIF built first)
    dir: crates/ts-pack-elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - mix credo --strict

  lint:check:
    desc: Check Elixir linting without modifications (CI)
    dir: crates/ts-pack-elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - mix credo --strict

  update:
    desc: Update Elixir dependencies to latest versions
    dir: crates/ts-pack-elixir
    cmds:
      - echo "Updating Elixir dependencies to latest versions..."
      - cmd: echo "Note - Elixir requires manual mix.exs edits for major version updates"
      - mix hex.outdated
      - mix deps.update --all
      - echo "Checking remaining outdated dependencies..."
      - mix hex.outdated || true

  clean:
    desc: Clean Elixir build artifacts
    dir: crates/ts-pack-elixir
    cmds:
      - mix clean

  e2e:generate:
    desc: Generate Elixir E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang elixir

  e2e:test:
    desc: Run Elixir E2E tests
    dir: e2e/elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      MIX_ENV: test
    cmds:
      - mix deps.get
      - mix test
