version: "3"

vars:
  FFI_LIB_PATH: '{{.PROJECT_ROOT}}/target/release/libts_pack_ffi.{{if eq OS "darwin"}}dylib{{else if eq OS "windows"}}dll{{else}}so{{end}}'

tasks:
  deps:
    desc: Resolve Java/Maven dependencies
    dir: crates/ts-pack-java
    cmds:
      - mvn dependency:resolve -q

  build:ffi:
    desc: Build FFI shared library for Java
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build -p ts-pack-ffi --release

  build:
    desc: Build FFI library and Java package
    deps: [build:ffi]
    dir: crates/ts-pack-java
    cmds:
      - mvn package -DskipTests -q

  test:
    desc: Run Java tests (requires FFI built first)
    deps: [build:ffi]
    dir: crates/ts-pack-java
    env:
      TSPACK_LIB_PATH: "{{.FFI_LIB_PATH}}"
    cmds:
      - mvn test

  format:
    desc: Format Java code
    dir: crates/ts-pack-java
    cmds:
      - mvn com.spotify.fmt:fmt-maven-plugin:format

  format:check:
    desc: Check Java formatting (CI)
    dir: crates/ts-pack-java
    cmds:
      - mvn com.spotify.fmt:fmt-maven-plugin:check

  lint:
    desc: Lint Java code
    dir: crates/ts-pack-java
    cmds:
      - mvn com.spotify.fmt:fmt-maven-plugin:check

  lint:check:
    desc: Check Java linting without modifications (CI)
    dir: crates/ts-pack-java
    cmds:
      - mvn com.spotify.fmt:fmt-maven-plugin:check

  update:
    desc: Update Java dependencies and plugins (including linters)
    dir: crates/ts-pack-java
    cmds:
      - echo "Updating Java dependencies and plugins..."
      - mvn -DallowSnapshots=false versions:use-latest-releases -DprocessDependencies=true -DprocessParent=false -DgenerateBackupPoms=false
      - echo "Updating plugin versions in properties..."
      - mvn -DallowSnapshots=false versions:update-properties -DgenerateBackupPoms=false || true
      - echo "Displaying final dependency updates..."
      - mvn -DallowSnapshots=false versions:display-dependency-updates
      - echo "Displaying final plugin updates..."
      - mvn -DallowSnapshots=false versions:display-plugin-updates

  clean:
    desc: Clean Java build artifacts
    dir: crates/ts-pack-java
    cmds:
      - mvn clean -q

  e2e:generate:
    desc: Generate Java E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang java

  e2e:test:
    desc: Run Java E2E tests
    deps: [build:ffi]
    dir: e2e/java
    env:
      TSPACK_LIB_PATH: "{{.FFI_LIB_PATH}}"
    cmds:
      - mvn test
