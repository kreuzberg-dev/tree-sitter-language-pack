[package]
name = "ts-pack-core-rb"
version = "1.6.3"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
readme = false
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
categories = ["text-processing"]

[lib]
crate-type = ["cdylib"]

[dependencies]
tree-sitter-language-pack = { path = "../../../../../crates/ts-pack-core", features = ["download", "serde", "config"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
