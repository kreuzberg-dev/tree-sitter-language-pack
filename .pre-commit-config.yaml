default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^e2e/|^test_apps/|vendor/|node_modules/|target/|parsers/|crates/.*/deps/|crates/.*/tmp/|_build/

repos:
  # AI Rules
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.0.6
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: Cargo.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.4"
    hooks:
      - id: cargo-sort
        args: [-w]

  # Rust: formatting and linting
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.82"
    hooks:
      - id: rumdl-fmt
        exclude: "^.ai-rulez/"

  # Markdown prose linting: textlint
  - repo: local
    hooks:
      - id: textlint
        name: textlint (docs prose)
        entry: textlint
        language: node
        additional_dependencies:
          - textlint@15.5.4
          - textlint-filter-rule-comments@1.3.0
          - textlint-filter-rule-node-types@1.1.0
          - textlint-rule-alex@5.0.0
          - textlint-rule-common-misspellings@1.0.1
          - textlint-rule-doubled-spaces@1.0.2
          - textlint-rule-en-capitalization@2.0.3
          - textlint-rule-en-max-word-count@2.0.1
          - textlint-rule-no-empty-section@1.1.0
          - textlint-rule-no-start-duplicated-conjunction@2.0.2
          - textlint-rule-no-surrogate-pair@1.0.1
          - textlint-rule-no-todo@2.0.1
          - textlint-rule-no-zero-width-spaces@1.0.1
          - textlint-rule-stop-words@5.2.0
          - textlint-rule-terminology@5.2.16
          - textlint-rule-write-good@2.0.0
          - "@textlint-rule/textlint-rule-no-invalid-control-character@3.0.0"
          - "@textlint-rule/textlint-rule-no-unmatched-pair@2.0.4"
        files: ^docs/.*\.md$
        exclude: ^docs/(CHANGELOG|snippets/)
        pass_filenames: true

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        exclude: "^(e2e/|fixtures/bench/|scripts/clone_vendors\\.py$)"

  # Node/TS/WASM: oxlint
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.60.0
    hooks:
      - id: oxlint
        args: ["--fix"]

  # Java: copy-paste detection and style checking
  - repo: https://github.com/gherynos/pre-commit-java
    rev: v0.6.37
    hooks:
      - id: cpd
        exclude: ^(e2e/|test_apps/|packages/java/dev/)
      - id: checkstyle
        args:
          [
            "-c",
            "packages/java/checkstyle.xml",
            "-p",
            "packages/java/checkstyle.properties",
          ]
        exclude: ^(e2e/|test_apps/|packages/java/src/|packages/java/dev/)

  # C/FFI: formatting and linting
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file, -i]
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
        exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
      - id: cppcheck
        args:
          [
            "--std=c11",
            "--enable=warning,style,performance",
            "--suppress=missingIncludeSystem",
            "--suppress=unusedStructMember",
            "--suppress=normalCheckLevelMaxBranches",
          ]
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)

  # Go: formatting and linting (runs per Go module via Taskfile)
  - repo: local
    hooks:
      - id: golangci-lint-full
        name: golangci-lint (all Go modules)
        entry: task go:lint
        language: system
        files: \.go$
        pass_filenames: false

  # Local hooks for Ruby, Java verify, C#, PHP, Elixir
  - repo: local
    hooks:
      # Ruby
      - id: ruby-format
        name: Ruby formatting (rubocop)
        entry: task ruby:format
        language: system
        files: \.rb$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: ruby-lint
        name: Ruby linting (rubocop + steep)
        entry: task ruby:lint
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Java (maven verify — cpd/checkstyle handled by pre-commit-java above)
      - id: java-verify
        name: maven verify (java)
        entry: bash -lc 'if [ -f "$HOME/.sdkman/bin/sdkman-init.sh" ]; then source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk env; fi; MAVEN_OPTS="${MAVEN_OPTS:-} --enable-native-access=ALL-UNNAMED -Dsun.misc.unsafe.memory.access=allow" mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true verify'
        language: system
        files: ^packages/java/
        pass_filenames: false

      # C#
      - id: csharp-format
        name: C# formatting (dotnet format)
        entry: task csharp:format
        language: system
        files: \.cs$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: csharp-lint
        name: C# linting (dotnet format)
        entry: task csharp:lint
        language: system
        files: \.cs$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # PHP
      - id: php-format
        name: PHP formatting (php-cs-fixer)
        entry: task php:format
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: php-lint
        name: PHP linting (phpstan + php-cs-fixer)
        entry: task php:lint
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Elixir
      - id: mix-format
        name: mix format
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix format --check-formatted'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix credo --strict'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

  # Alef: polyglot binding generation and version sync
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.7.11
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos
        args: [--force-exclude]
