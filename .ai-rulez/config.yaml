$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
version: "3.0"
name: tree-sitter-language-pack
description: Comprehensive tree-sitter grammar compilation and polyglot parser bindings (Python, TypeScript, Ruby, Go, Java, C#, Elixir, PHP, WASM)
gitignore: true

presets:
  - claude
  - gemini
  - codex

builtins:
  - rust
  - python
  - typescript
  - go
  - java
  - ruby
  - php
  - csharp
  - elixir
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

# Include shared ai-rulez configuration from git repository
# local_override: when set and path exists, uses local copy instead of git (for development)
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-languages
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/languages
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    local_override: ../ai-rulez
    merge_strategy: local-override

profiles:
  full:
    - parser-compilation
    - language-management
default: full

header:
  style: minimal

compression:
  level: moderate
