version: "3"

includes:
  rust:
    taskfile: .task/rust.yml
  python:
    taskfile: .task/python.yml

vars:
  PROJECT_ROOT:
    sh: pwd
  VERSION:
    sh: grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and initialize project. Idempotent - safe to re-run anytime."
    cmds:
      - echo "Installing language tools..."
      - task: rust:install
      - task: python:install
      - echo "Cloning parser sources..."
      - task: clone
      - echo "Generating AI rules..."
      - task: ai-rulez
      - echo "Setup complete - safe to re-run anytime"

  ai-rulez:
    desc: Generate ai-rulez configuration files (CLAUDE.md, etc.)
    cmds:
      - npx -y ai-rulez@latest generate

  clone:
    desc: Clone all vendor parser repositories
    cmds:
      - uv run --no-sync scripts/clone_vendors.py
    sources:
      - sources/language_definitions.json

  build:
    desc: Build all crates (dynamic mode, all languages)
    cmds:
      - task: rust:build

  build:dev:
    desc: Build in dev mode with a few languages for fast iteration
    cmds:
      - task: rust:build:dev

  build:release:
    desc: Build in release mode (optimized)
    cmds:
      - task: rust:build:release

  test:
    desc: Run all tests
    cmds:
      - task: rust:test

  lint:
    desc: Run all linters and formatters via prek (pre-commit framework)
    cmds:
      - prek run --all-files

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  format:
    desc: Format all code
    cmds:
      - task: rust:format
      - task: python:format

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: rust:clean
      - task: python:clean

  update:
    desc: Update all dependencies to latest versions
    cmds:
      - echo "Updating Rust dependencies..."
      - task: rust:update
      - echo "Updating Python dependencies..."
      - task: python:update
      - echo "Updating language grammar revisions..."
      - uv run --no-sync scripts/pin_vendors.py
      - echo "Updating prek dependencies..."
      - prek autoupdate
      - echo "All dependencies updated"

  update:grammars:
    desc: Update language grammar revisions
    cmds:
      - uv run --no-sync scripts/pin_vendors.py

  update:grammars:missing:
    desc: Pin only languages missing revisions
    cmds:
      - uv run --no-sync scripts/pin_vendors.py --only-missing

  # E2E test generation
  e2e:generate:all:
    desc: Generate E2E tests for all languages from fixtures
    cmds:
      - cargo run -p e2e-generator -- generate --lang all
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:rust:
    desc: Generate and format Rust E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang rust
      - cargo fmt --manifest-path e2e/rust/Cargo.toml
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:python:
    desc: Generate and lint Python E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang python
      - uv run --no-sync ruff check --fix e2e/python/
      - uv run --no-sync ruff format e2e/python/
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:typescript:
    desc: Generate TypeScript E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang typescript
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:go:
    desc: Generate and format Go E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang go
      - gofmt -w e2e/go/
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:java:
    desc: Generate Java E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang java
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:elixir:
    desc: Generate Elixir E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:generate:c:
    desc: Generate C E2E tests
    cmds:
      - cargo run -p e2e-generator -- generate --lang c
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  e2e:test:rust:
    desc: Run Rust E2E tests (generate + format + test)
    cmds:
      - task: e2e:generate:rust
      - cargo test --manifest-path e2e/rust/Cargo.toml
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      TSLP_LINK_MODE: dynamic

  e2e:generate:smoke-fixtures:
    desc: Auto-generate smoke fixtures from language_definitions.json
    cmds:
      - cargo run -p e2e-generator -- generate-smoke-fixtures --definitions sources/language_definitions.json --output fixtures/smoke
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"

  # README generation
  generate-readme:
    desc: Generate all READMEs from templates
    cmds:
      - python3 scripts/generate_readme.py

  generate-readme:check:
    desc: Validate READMEs match templates (CI)
    cmds:
      - python3 scripts/generate_readme.py --validate

  generate-readme:dry-run:
    desc: Preview README generation without writing
    cmds:
      - python3 scripts/generate_readme.py --dry-run
