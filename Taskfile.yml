version: "3"

includes:
  rust:
    taskfile: .task/rust.yml
  python:
    taskfile: .task/python.yml
  node:
    taskfile: .task/node.yml
  go:
    taskfile: .task/go.yml
  java:
    taskfile: .task/java.yml
  elixir:
    taskfile: .task/elixir.yml
  c:
    taskfile: .task/c.yml
  ruby:
    taskfile: .task/ruby.yml
  wasm:
    taskfile: .task/wasm.yml
  php:
    taskfile: .task/php.yml
  csharp:
    taskfile: .task/csharp.yml
  version:
    taskfile: .task/version.yml
  test-apps:
    taskfile: .task/test-apps.yml

vars:
  PROJECT_ROOT:
    sh: pwd
  VERSION:
    sh: python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and initialize project. Idempotent - safe to re-run anytime."
    cmds:
      - echo "Installing pre-commit hooks..."
      - prek install
      - prek install --hook-type commit-msg
      - echo "Cloning parser sources..."
      - task: clone
      - echo "Setting up language tools..."
      - alef setup
      - echo "Generating AI rules..."
      - task: ai-rulez
      - echo "Setup complete - safe to re-run anytime"

  ai-rulez:
    desc: Generate ai-rulez configuration files (CLAUDE.md, etc.)
    cmds:
      - npx -y ai-rulez@latest generate

  clone:
    desc: Clone all vendor parser repositories
    cmds:
      - uv run --no-sync scripts/clone_vendors.py
    sources:
      - sources/language_definitions.json

  build:
    desc: Build all crates (dynamic mode, all languages)
    cmds:
      - task: rust:build

  build:dev:
    desc: Build in dev mode with a few languages for fast iteration
    cmds:
      - task: rust:build:dev

  build:release:
    desc: Build in release mode (optimized)
    cmds:
      - task: rust:build:release

  test:
    desc: Run all tests
    cmds:
      - task: rust:test

  lint:
    desc: Run all linters and formatters via prek (pre-commit framework)
    cmds:
      - prek run --all-files

  lint:licenses:
    desc: Verify all grammar repositories use permissive licenses (no GPL/AGPL/copyleft)
    cmds:
      - uv run --no-sync python scripts/lint_grammar_licenses.py --update-cache

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  format:
    desc: Format all code
    cmds:
      - task: rust:format
      - alef fmt

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: rust:clean
      - alef clean

  update:
    desc: Update all dependencies to latest versions
    cmds:
      - echo "Updating Rust dependencies..."
      - task: rust:update
      - echo "Updating binding language dependencies..."
      - alef update
      - echo "Updating language grammar revisions..."
      - uv run --no-sync scripts/pin_vendors.py
      - echo "Updating prek dependencies..."
      - prek autoupdate
      - echo "All dependencies updated"

  update:grammars:
    desc: Update language grammar revisions
    cmds:
      - uv run --no-sync scripts/pin_vendors.py

  update:grammars:missing:
    desc: Pin only languages missing revisions
    cmds:
      - uv run --no-sync scripts/pin_vendors.py --only-missing

  update:grammars:check:
    desc: Check for grammar updates against upstream (reports stale revisions without writing)
    cmds:
      - uv run --no-sync scripts/check_grammar_updates.py

  # E2E test generation
  # E2E test generation (via alef)
  e2e:generate:all:
    desc: Generate E2E tests for all languages from fixtures
    cmds:
      - alef e2e generate

  e2e:generate:rust:
    desc: Generate and format Rust E2E tests
    cmds:
      - alef e2e generate --lang rust

  e2e:test:rust:
    desc: Run Rust E2E tests (generate + test)
    cmds:
      - task: e2e:generate:rust
      - cargo test --manifest-path e2e/rust/Cargo.toml
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      TSLP_LINK_MODE: static

  # Documentation generation
  docs:generate:languages:
    desc: Generate supported languages documentation from language_definitions.json
    cmds:
      - python3 scripts/generate_grammar_table.py
    sources:
      - sources/language_definitions.json
    generates:
      - docs/supported-languages.md

  docs:generate:api:
    desc: Generate API reference docs (via alef)
    cmds:
      - alef docs

  # README generation (via alef)
  generate-readme:
    desc: Generate all package READMEs
    cmds:
      - alef readme
